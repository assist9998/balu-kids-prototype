<style>
  :root {
    --bg:        #FFFFFF;
    --card:      #FFFDF6;   /* warm white */
    --ink:       #4A3526;   /* warm dark brown */
    --ink-soft:  #7C6651;
    --ink-faint: #AC9A82;
    --ok:        #3DAE7A;
    --no:        #E0654F;
    --warn:      #E0A02E;
    --accent:    #F2A81D;
    --accent-soft: #FEF3CC;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #ECE8DD;
    font-family: 'Nunito', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  html, body { height: 100%; overflow: hidden; background: #FFFFFF; }
  #root {
    height: 100vh;
    height: 100dvh;
    box-sizing: border-box;
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* hide scrollbars inside the device */
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  /* press feedback */
  .bk-press { transition: transform .12s cubic-bezier(.22,1,.36,1), filter .12s, opacity .12s; }
  .bk-press:active { transform: scale(0.96); filter: brightness(0.98); }

  /* screen transitions */
  @keyframes scrFwd  { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: none; } }
  @keyframes scrBack { from { opacity: 0; transform: translateX(-22px); } to { opacity: 1; transform: none; } }
  .scr-fwd  { animation: scrFwd  .34s cubic-bezier(.22,1,.36,1); }
  .scr-back { animation: scrBack .30s cubic-bezier(.22,1,.36,1); }

  /* toast */
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 14px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .bk-toast { animation: toastIn .3s cubic-bezier(.22,1,.36,1); }

  @media (prefers-reduced-motion: reduce) {
    .scr-fwd, .scr-back, .bk-toast { animation: none; }
  }
</style>

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}

      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',

}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// ui.jsx — shared visual atoms for Балу Кидс. Exported to window.
// Colors come from CSS vars set on the app root: --accent, --ink, --bg, --card, --ok, --no, --warn

function clsx() { return Array.prototype.filter.call(arguments, Boolean).join(' '); }

// ── pastel avatar bubble ───────────────────────────────────────
function Avatar({ emoji, color = '#eee', size = 46, ring }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', background: color,
      display: 'grid', placeItems: 'center', flexShrink: 0,
      fontSize: size * 0.5, lineHeight: 1,
      boxShadow: ring ? `0 0 0 3px var(--bg), 0 0 0 ${3 + 2}px ${color}` : 'none',
    }}>{emoji}</div>
  );
}

// ── status: dot, chip ──────────────────────────────────────────
const STATUS_COLOR = { present: 'var(--ok)', absent: 'var(--no)', late: 'var(--warn)' };
const STATUS_KEY   = { present: 'present', absent: 'absent', late: 'late' };

function StatusDot({ status, size = 9 }) {
  return <span style={{ width: size, height: size, borderRadius: '50%', background: STATUS_COLOR[status], display: 'inline-block', flexShrink: 0 }} />;
}

function StatusChip({ status, onClick }) {
  const label = t(STATUS_KEY[status]);
  const c = STATUS_COLOR[status];
  return (
    <button onClick={onClick} className="bk-press" style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '6px 11px 6px 9px', borderRadius: 999, border: 'none', cursor: onClick ? 'pointer' : 'default',
      background: `color-mix(in srgb, ${c} 16%, transparent)`, color: c,
      fontFamily: 'inherit', fontWeight: 700, fontSize: 13, letterSpacing: '-0.01em',
    }}>
      <StatusDot status={status} size={8} />{label}
    </button>
  );
}

// ── donut ring with center label ───────────────────────────────
function Ring({ pct, size = 132, stroke = 14, color = 'var(--accent)', track = 'rgba(0,0,0,0.06)', children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - pct / 100);
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{ transition: 'stroke-dashoffset 0.9s cubic-bezier(.22,1,.36,1)' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', textAlign: 'center' }}>
        {children}
      </div>
    </div>
  );
}

// ── horizontal bar row (e.g. by-group attendance) ──────────────
function BarRow({ label, value, max = 100, color = 'var(--accent)', right }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 78, fontSize: 14, fontWeight: 600, color: 'var(--ink)', flexShrink: 0 }}>{label}</div>
      <div style={{ flex: 1, height: 10, borderRadius: 999, background: 'rgba(0,0,0,0.05)', overflow: 'hidden' }}>
        <div style={{ width: `${(value / max) * 100}%`, height: '100%', borderRadius: 999, background: color,
          transition: 'width 0.8s cubic-bezier(.22,1,.36,1)' }} />
      </div>
      <div style={{ width: 42, textAlign: 'right', fontSize: 13, fontWeight: 700, color: 'var(--ink-soft)', flexShrink: 0 }}>{right}</div>
    </div>
  );
}

// ── soft card ──────────────────────────────────────────────────
function Card({ children, style, onClick, pad = 16 }) {
  return (
    <div onClick={onClick} className={onClick ? 'bk-press' : ''} style={{
      background: 'var(--card)', borderRadius: 22, padding: pad,
      boxShadow: '0 1px 2px rgba(60,40,20,0.04), 0 8px 24px -16px rgba(60,40,20,0.18)',
      cursor: onClick ? 'pointer' : 'default', ...style,
    }}>{children}</div>
  );
}

// ── small section label ────────────────────────────────────────
function SectionLabel({ children, right }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '0 4px 10px' }}>
      <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--ink-soft)' }}>{children}</div>
      {right}
    </div>
  );
}

// ── chevron ────────────────────────────────────────────────────
function Chevron({ dir = 'right', size = 16, color = 'var(--ink-faint)' }) {
  const rot = { right: 0, left: 180, down: 90, up: -90 }[dir];
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{ transform: `rotate(${rot}deg)`, flexShrink: 0 }}>
      <path d="M6 3l5 5-5 5" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

Object.assign(window, { clsx, Avatar, StatusDot, StatusChip, Ring, BarRow, Card, SectionLabel, Chevron, STATUS_COLOR });

</script>

function HomeScreen({ go, statuses, feed, homeStyle }) {
  const kids = DATA.CHILDREN;
  const present = kids.filter(k => statuses[k.id] !== 'absent').length;
  const rate = Math.round((kids.filter(k => statuses[k.id] === 'present').length) / kids.length * 100);
  const unread = feed.filter(f => f.unread).length;

  const TILES = [

function ChildScreen({ params, statuses }) {

      <SectionLabel>{t('parents')}</SectionLabel>

        <React.Fragment>
          <SectionLabel>{t('notes')}</SectionLabel>

function ParentCard({ role, name, phone, emoji }) {
  return (
    <Card pad={12} style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#FBF7F2' }}>
      <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'var(--card)', display: 'grid', placeItems: 'center', fontSize: 22, flexShrink: 0 }}>{emoji}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-faint)' }}>{role}</div>
        <div style={{ fontSize: 15.5, fontWeight: 700, color: 'var(--ink)' }}>{name}</div>
        <div style={{ fontSize: 13, color: 'var(--ink-soft)', fontWeight: 600 }}>{phone}</div>
      </div>
    </Card>
  );
}

function ageFromDob(dob) {
  const [d, m, y] = dob.split('.').map(Number);
  const now = new Date(2026, 5, 16);
  let a = now.getFullYear() - y;
  if (now.getMonth() + 1 < m || (now.getMonth() + 1 === m && now.getDate() < d)) a--;
  return `${a} ${t('years')}`;
}

Object.assign(window, { HomeScreen, ChildrenScreen, GroupScreen, ChildScreen });

<script type="text/babel">
// screens2.jsx — Attendance, Summary, Notifications, Compose. Exported to window.

// ════════════════════════════════════════════════════════════════
//  ATTENDANCE — tap to cycle present → late → absent
// ════════════════════════════════════════════════════════════════
const CYCLE = { present: 'late', late: 'absent', absent: 'present' };

    present: kids.filter(k => statuses[k.id] === 'present').length,
    late:    kids.filter(k => statuses[k.id] === 'late').length,
    absent:  kids.filter(k => statuses[k.id] === 'absent').length,
  };
  const chips = [{ id: 'all', label: t('all'), emoji: '🗂️' }, ...DATA.GROUPS.map(g => ({ id: g.id, label: Lo(g), emoji: g.emoji }))];

  return (

      <div style={{ display: 'flex', gap: 10, padding: '0 20px 8px' }}>

        <CountStat n={counts.late}    label={t('late')}    color="var(--warn)" />
        <CountStat n={counts.absent}  label={t('absent')}  color="var(--no)" />
      </div>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 24px 12px' }}>

          color: '#fff', background: '#B07848', padding: '7px 12px', borderRadius: 999 }}>

function CountStat({ n, label, color }) {
  return (
    <div style={{ flex: 1, background: '#FBF7F2', borderRadius: 18, padding: '12px 8px', textAlign: 'center',
      boxShadow: '0 1px 2px rgba(60,40,20,0.04)' }}>

// ════════════════════════════════════════════════════════════════
//  SUMMARY
// ════════════════════════════════════════════════════════════════
function SummaryScreen({ statuses }) {
  const kids = DATA.CHILDREN;
  const present = kids.filter(k => statuses[k.id] === 'present').length;
  const late    = kids.filter(k => statuses[k.id] === 'late').length;
  const absent  = kids.filter(k => statuses[k.id] === 'absent').length;
  const here    = present + late;
  const rate = Math.round(here / kids.length * 100);
  const napping = Math.round(here * 0.82);

  const MONTHLY = { toddler: 400, middle: 450, big: 500, primary: 550 };
  const DAILY   = { toddler: 35,  middle: 40,  big: 45,  primary: 50  };
  const DAYS = 18;
  const payPaid   = kids.filter((k, i) => i % 3 !== 2).length;
  const payUnpaid = kids.length - payPaid;
  const totalCollected = kids.filter((k, i) => i % 3 !== 2)
    .reduce((s, k) => s + (k.contract === 'tourist' ? DAILY[k.group] * DAYS : MONTHLY[k.group]), 0);

  return (
    <div style={{ padding: '4px 20px 30px', display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* hero ring */}
      <Card pad={20} style={{ display: 'flex', alignItems: 'center', gap: 20, background: '#FBF7F2' }}>
        <Ring pct={rate} size={120} stroke={13} color='#B07848'>
          <div>
            <div style={{ fontSize: 30, fontWeight: 800, color: 'var(--ink)', lineHeight: 1, fontFamily: 'var(--font-display)' }}>{rate}%</div>
            <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink-faint)', marginTop: 2 }}>{t('rate')}</div>
          </div>
        </Ring>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
          <MiniStat dot="var(--ok)"   n={present} label={t('present')} />
          <MiniStat dot="var(--warn)" n={late}    label={t('late')} />
          <MiniStat dot="var(--no)"   n={absent}  label={t('absent')} />
        </div>
      </Card>

      {/* by group */}
      <Card pad={18} style={{ background: '#FBF7F2' }}>
        <SectionLabel>{t('byGroup')}</SectionLabel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginTop: 4 }}>
          {DATA.GROUPS.map(g => {
            const gk = kids.filter(k => k.group === g.id);
            const gh = gk.filter(k => statuses[k.id] !== 'absent').length;
            return <BarRow key={g.id} label={Lo(g)} value={Math.round(gh / gk.length * 100)} color={g.ink}
              right={`${gh}/${gk.length}`} />;

      </Card>

      {/* week */}
      <Card pad={18} style={{ background: '#FBF7F2' }}>
        <SectionLabel>{t('thisWeek')}</SectionLabel>

      {/* payments */}
      <Card pad={18} style={{ background: '#FBF7F2' }}>
        <SectionLabel>{t('payments')}</SectionLabel>
        <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
          <div style={{ flex: 1, textAlign: 'center' }}>
            <div style={{ fontSize: 26, fontWeight: 800, color: 'var(--ok)', lineHeight: 1, fontFamily: 'var(--font-display)' }}>{payPaid}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Оплатили', 'Paid')}</div>
          </div>
          <div style={{ flex: 1, textAlign: 'center' }}>
            <div style={{ fontSize: 26, fontWeight: 800, color: 'var(--no)', lineHeight: 1, fontFamily: 'var(--font-display)' }}>{payUnpaid}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Не оплатили', 'Unpaid')}</div>
          </div>
          <div style={{ flex: 1.4, textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: '#B07848', lineHeight: 1, fontFamily: 'var(--font-display)' }}>${totalCollected}</div>
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Собрано', 'Collected')}</div>
          </div>
        </div>
      </Card>

    </div>
  );
}

function MiniStat({ dot, n, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>

      <span style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink-soft)' }}>{label}</span>
    </div>

}

function WeekChart() {
  const max = Math.max(...DATA.WEEK.map(d => d.v));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 10, height: 110, marginTop: 8 }}>
      {DATA.WEEK.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, height: '100%', justifyContent: 'flex-end' }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink-soft)' }}>{d.v}</div>
          <div style={{ width: '100%', maxWidth: 30, height: `${(d.v / 100) * 78}px`, borderRadius: 8,

function ComposeScreen({ back, actions }) {
  const [to, setTo] = React.useState('all');
  const [text, setText] = React.useState('');

  function send() {
    if (!text.trim()) return;
    const toLabel = targets.find(x => x.id === to).label;
    actions.addPost({ ru: text, en: text, to: toLabel });
    actions.toast(t('sent') + ' ✓');
    back();
  }

  return (
    <div style={{ padding: '6px 20px 30px', display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div>
        <SectionLabel>{t('to')}</SectionLabel>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>

            <button key={x.id} onClick={() => setTo(x.id)} className="bk-press" style={{
              border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: 13.5, fontWeight: 700,
              padding: '9px 14px', borderRadius: 999,
              background: to === x.id ? '#B07848' : '#FBF7F2',
              color: to === x.id ? '#fff' : 'var(--ink-soft)',

              {x.emoji} {x.label}
            </button>
          ))}
        </div>
      </div>

      <div>
        <SectionLabel>{t('typeMsg')}</SectionLabel>
        <textarea value={text} onChange={e => setText(e.target.value)} placeholder={t('messageText')}
          rows={5} style={{ width: '100%', boxSizing: 'border-box', resize: 'none', border: 'none',
          background: '#FBF7F2', borderRadius: 18, padding: 16, fontFamily: 'inherit', fontSize: 15.5,
          color: 'var(--ink)', fontWeight: 600, lineHeight: 1.4, outline: 'none',
          boxShadow: '0 1px 2px rgba(60,40,20,0.05)' }} />
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 10 }}>
          {[L('Доброе утро! ☀️', 'Good morning! ☀️'), L('Напоминаем о…', 'Reminder about…'), L('Спасибо! 🙏', 'Thank you! 🙏')].map((q, i) => (
            <button key={i} onClick={() => setText(t2 => (t2 ? t2 + ' ' : '') + q)} className="bk-press" style={{
              border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: 12.5, fontWeight: 600,
              padding: '7px 12px', borderRadius: 999, background: 'var(--accent-soft)', color: 'var(--ink-soft)' }}>{q}</button>
          ))}
        </div>
      </div>

      <button onClick={send} className="bk-press" disabled={!text.trim()} style={{
        width: '100%', border: 'none', cursor: text.trim() ? 'pointer' : 'default', fontFamily: 'var(--font-display)',
        background: text.trim() ? '#B07848' : 'rgba(0,0,0,0.12)', color: '#fff', fontSize: 17, fontWeight: 800,
        padding: 15, borderRadius: 18, marginTop: 4,
        boxShadow: text.trim() ? '0 10px 24px -8px #B07848' : 'none', transition: 'background .2s' }}>
        ✈️ {t('send')}
      </button>
    </div>
  );
}

function PaymentsScreen() {
  const [tariff, setTariff]   = React.useState('longterm');
  const [group,  setGroup]    = React.useState('all');
  const [paid, setPaid] = React.useState(() => {
    const m = {};
    DATA.CHILDREN.forEach((k, i) => { m[k.id] = i % 3 !== 2; });
    return m;
  });
  const [saved, setSaved] = React.useState(() => {
    const m = {};
    DATA.CHILDREN.forEach((k, i) => { m[k.id] = i % 3 !== 2; });
    return m;
  });
  const [toast, setToast] = React.useState(null);
  const hasChanges = DATA.CHILDREN.some(k => paid[k.id] !== saved[k.id]);

  function handleSave() {
    setSaved({ ...paid });
    setToast(L('Сохранено ✓', 'Saved ✓'));
    setTimeout(() => setToast(null), 2000);
  }

  const MONTHLY = { toddler: 400, middle: 450, big: 500, primary: 550 };
  const DAILY   = { toddler: 35,  middle: 40,  big: 45,  primary: 50  };
  const isTour  = tariff === 'tourist';

  const chips = [{ id: 'all', label: t('all'), emoji: '🗂️' }, ...DATA.GROUPS.map(g => ({ id: g.id, label: Lo(g), emoji: g.emoji }))];
  const kids = DATA.CHILDREN
    .filter(k => isTour ? k.contract === 'tourist' : k.contract !== 'tourist')
    .filter(k => group === 'all' || k.group === group);

  const getAmount = kid => isTour ? DAILY[kid.group] : MONTHLY[kid.group];
  const countPaid   = kids.filter(k =>  paid[k.id]).length;
  const countUnpaid = kids.filter(k => !paid[k.id]).length;
  const totalPaid   = kids.filter(k =>  paid[k.id]).reduce((s, k) => s + getAmount(k), 0);
  const PALETTE = ['#FBE7A8','#CDE8FB','#D4F0DF','#FBD9E1','#FBE0C0','#E8D5FB'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100%' }}>

      {/* tariff toggle */}
      <div style={{ display: 'flex', margin: '0 20px 14px', background: '#FBF7F2', borderRadius: 999, padding: 4, gap: 4 }}>
        {[['longterm', L('Долгосрочные', 'Long term')], ['tourist', L('Туристы', 'Tourist')]].map(([id, label]) => (
          <button key={id} onClick={() => { setTariff(id); setGroup('all'); }} className="bk-press" style={{
            flex: 1, border: 'none', cursor: 'pointer', fontFamily: 'inherit',
            padding: '9px 4px', borderRadius: 999, fontSize: 13, fontWeight: 800,
            background: tariff === id ? '#B07848' : 'transparent',
            color: tariff === id ? '#fff' : 'var(--ink-soft)',
            transition: 'all 0.2s' }}>
            {label}
          </button>
        ))}
      </div>

      {/* group filter */}
      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '0 20px 14px', scrollbarWidth: 'none' }}>
        {chips.map(c => (
          <button key={c.id} onClick={() => setGroup(c.id)} className="bk-press" style={{
            flexShrink: 0, border: 'none', cursor: 'pointer', fontFamily: 'inherit',
            padding: '7px 12px', borderRadius: 999, fontSize: 13, fontWeight: 700,
            background: group === c.id ? '#B07848' : '#FBF7F2',
            color: group === c.id ? '#fff' : 'var(--ink-soft)',
            boxShadow: group === c.id ? '0 6px 14px -6px #B07848' : '0 1px 2px rgba(60,40,20,0.05)' }}>
            {c.emoji} {c.label}
          </button>
        ))}
      </div>

      {/* stats */}
      <div style={{ display: 'flex', gap: 10, padding: '0 20px 16px' }}>
        <div style={{ flex: 1, background: '#FBF7F2', borderRadius: 18, padding: '12px 8px', textAlign: 'center' }}>
          <div style={{ fontSize: 26, fontWeight: 800, color: 'var(--ok)', lineHeight: 1, fontFamily: 'var(--font-display)' }}>{countPaid}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Оплатили', 'Paid')}</div>
        </div>
        <div style={{ flex: 1, background: '#FBF7F2', borderRadius: 18, padding: '12px 8px', textAlign: 'center' }}>
          <div style={{ fontSize: 26, fontWeight: 800, color: 'var(--no)', lineHeight: 1, fontFamily: 'var(--font-display)' }}>{countUnpaid}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Не оплатили', 'Unpaid')}</div>
        </div>
        <div style={{ flex: 1.4, background: '#FBF7F2', borderRadius: 18, padding: '12px 8px', textAlign: 'center' }}>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#B07848', lineHeight: 1, fontFamily: 'var(--font-display)' }}>${totalPaid}</div>
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 4 }}>{L('Собрано', 'Collected')}</div>
        </div>
      </div>

      {/* list */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9, padding: '0 20px' }}>
        {kids.map(kid => {
          const grp = DATA.GROUPS.find(g => g.id === kid.group);
          const isPaid = paid[kid.id];
          const amount = getAmount(kid);
          const kidIndex = DATA.CHILDREN.filter(k => k.group === kid.group).findIndex(k => k.id === kid.id);
          return (
            <Card key={kid.id} pad={12} onClick={() => setPaid(m => ({ ...m, [kid.id]: !m[kid.id] }))}
              style={{ display: 'flex', alignItems: 'center', gap: 13, background: '#FBF7F2' }}>
              <Avatar emoji={kid.emoji} color={PALETTE[kidIndex % PALETTE.length]} size={44} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15.5, fontWeight: 700, color: 'var(--ink)' }}>{Lo(kid)}</div>
                <span style={{ background: grp.color, color: grp.ink, fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 999 }}>{grp.emoji} {Lo(grp)}</span>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--ink)', marginBottom: 4 }}>
                  ${amount}{isTour ? L('/день', '/day') : ''}
                </div>
                <span style={{ fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 999,
                  background: isPaid ? '#E6F7EE' : '#FEF0ED', color: isPaid ? '#1f7a55' : '#c0392b' }}>
                  {isPaid ? L('✓ Оплачено', '✓ Paid') : L('Не оплачено', 'Unpaid')}
                </span>
              </div>
            </Card>
          );
        })}
      </div>
      {hasChanges && (
        <div style={{ position: 'sticky', bottom: 0, marginTop: 16, padding: '14px 20px 26px',
          background: 'linear-gradient(to top, var(--bg) 62%, transparent)' }}>
          <button onClick={handleSave} className="bk-press" style={{
            width: '100%', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-display)',
            background: '#B07848', color: '#fff', fontSize: 17, fontWeight: 800, padding: '15px',
            borderRadius: 18, boxShadow: '0 10px 24px -8px #B07848' }}>
            {L('Сохранить', 'Save')}
          </button>
        </div>
      )}
      {toast && (
        <div style={{ position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
          background: 'var(--ink)', color: 'var(--bg)', padding: '12px 20px', borderRadius: 999,
          fontWeight: 700, fontSize: 14.5, whiteSpace: 'nowrap', zIndex: 40 }}>{toast}</div>
      )}
      {!hasChanges && <div style={{ height: 30 }} />}
    </div>
  );
}

              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { AttendanceScreen, SummaryScreen, NotificationsScreen, ComposeScreen, PaymentsScreen, ActivitiesScreen, ClubScreen });

<script type="text/babel">
// app.jsx — shell, navigation stack, language, tweaks. Mounts Балу Кидс.
// Globals: defines L / Lo / window.__lang. Uses screens + ui + i18n + data.

// ── language helpers (read live window.__lang) ─────────────────
window.__lang = window.__lang || 'ru';
function L(ru, en) { return window.__lang === 'ru' ? ru : en; }
function Lo(o) { return window.__lang === 'ru' ? o.ru : o.en; }
Object.assign(window, { L, Lo });

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#F2795B",
  "homeLayout": "Circles",
  "typeface": "Rounded"
}/*EDITMODE-END*/;

const FONTS = {
  Rounded: { display: "'Comfortaa', system-ui", body: "'Nunito', system-ui" },
  Clean:   { display: "'Onest', system-ui",     body: "'Onest', system-ui" },
};

const TITLES = {
  home: 'appName', children: 'children', attendance: 'markDay',
  payments: 'payments', activities: 'activities', summary: 'daySummary', notifications: 'notifications', compose: 'compose',
};

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = React.useState(() => localStorage.getItem('balu_lang') || 'ru');
  const [stack, setStack] = React.useState([{ name: 'home', params: {} }]);
  const [dir, setDir] = React.useState('fwd');
  const [statuses, setStatuses] = React.useState(() => {
    const m = {}; DATA.CHILDREN.forEach(k => m[k.id] = k.status); return m;
  });
  const [feed, setFeed] = React.useState(() => DATA.FEED.map(f => ({ ...f })));
  const [toast, setToast] = React.useState(null);

  // keep i18n + global lang in sync BEFORE children render
  window.__lang = lang;
  setI18nLang(lang);

  const top = stack[stack.length - 1];

  function go(name, params = {}) { setDir('fwd'); setStack(s => [...s, { name, params }]); }
  function back() { setDir('back'); setStack(s => s.length > 1 ? s.slice(0, -1) : s); }
  function home() { setDir('back'); setStack([{ name: 'home', params: {} }]); }
  function toggleLang() { const n = lang === 'ru' ? 'en' : 'ru'; setLang(n); localStorage.setItem('balu_lang', n); }

  function showToast(msg) { setToast(msg); clearTimeout(window.__tt); window.__tt = setTimeout(() => setToast(null), 1900); }

  const actions = {
    setStatus: (id, st) => setStatuses(m => ({ ...m, [id]: st })),
    markAllPresent: (ids) => setStatuses(m => { const n = { ...m }; ids.forEach(i => n[i] = 'present'); return n; }),
    markAllRead: () => setFeed(f => f.map(x => ({ ...x, unread: false }))),
    addPost: ({ ru, en, to }) => setFeed(f => [{
      id: Date.now(), type: 'sent', emoji: '✅',
      ru: `${to}: ${ru}`, en: `${to}: ${en}`, time: t('justNow'), timeEn: t('justNow'), unread: true,
    }, ...f]),
    toast: showToast,
  };

  // titles
  let title = t(TITLES[top.name] || 'appName');
  if (top.name === 'group') title = Lo(DATA.GROUPS.find(g => g.id === top.params.groupId));
  if (top.name === 'child') title = t('profile');

  const fonts = FONTS[tw.typeface] || FONTS.Rounded;
  const homeStyle = (tw.homeLayout || 'Circles').toLowerCase();

  const rootStyle = {
    '--accent': tw.accent,
    '--accent-soft': `color-mix(in srgb, ${tw.accent} 15%, var(--card))`,
    '--font-display': fonts.display,
    '--font-body': fonts.body,
    height: '100%', display: 'flex', flexDirection: 'column',
    position: 'relative', background: 'var(--bg)', color: 'var(--ink)',
    fontFamily: 'var(--font-body)',
  };

  function renderScreen() {
    const p = { ...top.params };
    switch (top.name) {
      case 'home':          return <HomeScreen go={go} statuses={statuses} feed={feed} homeStyle={homeStyle} />;
      case 'children':      return <ChildrenScreen go={go} statuses={statuses} />;
      case 'group':         return <GroupScreen params={p} go={go} statuses={statuses} />;
      case 'child':         return <ChildScreen params={p} statuses={statuses} />;
      case 'attendance':    return <AttendanceScreen statuses={statuses} actions={actions} />;
      case 'payments':      return <PaymentsScreen />;
      case 'activities':    return <ActivitiesScreen go={go} />;
      case 'club':          return <ClubScreen params={p} />;
      case 'summary':       return <SummaryScreen statuses={statuses} />;
      case 'notifications': return <NotificationsScreen feed={feed} go={go} actions={actions} />;
      case 'compose':       return <ComposeScreen back={back} actions={actions} />;
      default:              return null;
    }
  }

  return (
    <div style={rootStyle}>
      {/* ── header ── */}
      <div style={{ flexShrink: 0, position: 'relative', zIndex: 8,
        background: '#fff', paddingTop: 'env(safe-area-inset-top)',
        boxShadow: '0 2px 8px rgba(60,40,20,0.1)' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', padding: '2px 16px 10px', gap: 8 }}>
          {/* left: back or logo + title */}
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, flex: 1 }}>
            {stack.length > 1 ? (
              <button onClick={back} className="bk-press" style={{ display: 'flex', alignItems: 'center', gap: 4,
                border: 'none', background: '#B07848', cursor: 'pointer', fontFamily: 'inherit',
                color: '#fff', fontSize: 13, fontWeight: 800, padding: '5px 12px 5px 8px',
                borderRadius: 999 }}>
                <Chevron dir="left" size={16} color="#fff" />{t('back')}
              </button>
            ) : (
              <>
                <div style={{ position: 'relative', display: 'inline-flex', background: '#B07848', padding: '5px 14px', borderRadius: 999 }}>
                  <span style={{ fontSize: 15, fontWeight: 800, color: '#fff', fontFamily: 'var(--font-display)' }}>{title}</span>
                  <div style={{ position: 'absolute', bottom: -12, right: -26, background: '#F2A81D', color: '#3E2510', fontSize: 9, fontWeight: 800, padding: '1px 4px', borderRadius: 999, boxShadow: '0 2px 6px -2px rgba(60,40,20,0.2)' }}>mini app</div>
                </div>
              </>
            )}
          </div>
          {/* right: lang toggle only */}
          <button onClick={toggleLang} className="bk-press" style={{ display: 'flex', border: 'none', cursor: 'pointer',
            borderRadius: 999, overflow: 'hidden', fontFamily: 'inherit', fontSize: 12, fontWeight: 800,
            background: '#B07848', padding: 2, gap: 2 }}>
            <span style={{ padding: '5px 10px', borderRadius: 999, background: lang === 'ru' ? '#F2A81D' : 'transparent', color: lang === 'ru' ? '#3E2510' : '#fff', transition: 'all 0.2s' }}>RU</span>
            <span style={{ padding: '5px 10px', borderRadius: 999, background: lang === 'en' ? '#F2A81D' : 'transparent', color: lang === 'en' ? '#3E2510' : '#fff', transition: 'all 0.2s' }}>EN</span>
          </button>
        </div>
      </div>

      {/* ── scroll area ── */}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', position: 'relative' }}>
        <div key={top.name + stack.length} className={dir === 'fwd' ? 'scr-fwd' : 'scr-back'} style={{ minHeight: '100%' }}>
          {renderScreen()}
        </div>
      </div>

      {/* ── toast ── */}
      {toast && (
        <div className="bk-toast" style={{ position: 'absolute', bottom: 56, left: '50%', transform: 'translateX(-50%)',
          background: 'var(--ink)', color: 'var(--bg)', padding: '12px 20px', borderRadius: 999, fontWeight: 700,
          fontSize: 14.5, whiteSpace: 'nowrap', zIndex: 40, boxShadow: '0 12px 30px -8px rgba(0,0,0,0.4)' }}>{toast}</div>
      )}

      {/* ── tweaks ── */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Look" />
        <TweakRadio label="Home layout" value={tw.homeLayout} options={['Circles', 'Cards', 'List']}
          onChange={v => setTweak('homeLayout', v)} />
        <TweakRadio label="Typeface" value={tw.typeface} options={['Rounded', 'Clean']}
          onChange={v => setTweak('typeface', v)} />
        <TweakColor label="Accent" value={tw.accent}
          options={['#F2795B', '#2BA89E', '#8C6BE6', '#E8A33D']}
          onChange={v => setTweak('accent', v)} />
      </TweaksPanel>
    </div>
  );
}

function Stage() {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth <= 500;
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    if (isMobile) return;
    function fit() {
      const m = 24;
      setScale(Math.min((window.innerWidth - m) / 402, (window.innerHeight - m) / 874, 1.15));
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
  if (isMobile) {
    return (
      <div style={{ height: '100dvh', width: '100%', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        <App />
      </div>
    );
  }
  return (
    <div style={{ minHeight: '100vh', display: 'grid', placeItems: 'center', padding: 12, boxSizing: 'border-box' }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        <IOSDevice>
          <App />
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);

</script>
</body>
</html>
